# Mem0 OSS config for the local benchmark harness.
#
# DeepSeek is used for memory extraction. FastEmbed runs locally in the
# container for embeddings, so this does not require an OpenAI embeddings key.

version: "v1.1"

llm:
  provider: deepseek
  config:
    model: deepseek-v4-flash
    temperature: 0.1
    deepseek_base_url: ${DEEPSEEK_API_BASE}

embedder:
  provider: fastembed
  config:
    model: BAAI/bge-small-en-v1.5
    embedding_dims: 384

vector_store:
  provider: qdrant
  config:
    host: qdrant
    port: 6333
    collection_name: mem0_deepseek_fastembed
    embedding_model_dims: 384
